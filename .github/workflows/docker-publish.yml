name: Build and Publish Docker Image

# Builds the app's Docker image on every push to main (or a version tag)
# and publishes it to GitHub Container Registry (ghcr.io) - no extra
# secrets needed, GITHUB_TOKEN already has permission to push there.
#
# Your Ubuntu server then just runs `docker compose -f docker-compose.prod.yml
# pull && docker compose -f docker-compose.prod.yml up -d` (or ./deploy.sh)
# to grab the new image - see docker-compose.prod.yml, which points at
# this same image instead of building locally.

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase the image name
        id: image
        # ghcr.io/<owner>/<repo>, lowercased - GHCR rejects uppercase
        # characters, but github.repository preserves the repo's casing.
        run: echo "name=${REGISTRY,,}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max